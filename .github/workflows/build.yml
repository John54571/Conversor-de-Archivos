name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install UV
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      
      - name: Install dependencies
        run: uv sync
      
      - name: Build executable with PyInstaller
        run: uv run pyinstaller build.spec
      
      - name: Install Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer/conversor.iss
          options: /O+
      
      - name: Rename installer
        run: |
          $version = "${{ github.ref_name }}" -replace 'v', ''
          Rename-Item "dist/ConversorDeArchivos-Setup.exe" "Instalador-ConversorDeArchivos-$version.exe"
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/Instalador-ConversorDeArchivos-*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## ⬇️ Descargar
            
            **Instalador-ConversorDeArchivos-${{ github.ref_name }}.exe**
            
            _Ignorar los archivos "Source code" (zip/tar.gz) - son generados automáticamente por GitHub_
            
            ---
            
            ### Instalación
            1. Descargar el instalador
            2. Ejecutar y seguir los pasos
            3. (Opcional) Marcar "Instalar FFmpeg" para conversiones de audio/video
            
            ### Requisitos
            - Windows 10/11
            - FFmpeg (opcional, se puede instalar desde el instalador)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
